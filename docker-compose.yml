version: "3.9"
services:
  goexec:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      WORKER_COUNT: "10"
      JOB_QUEUE_SIZE: "100"
      DEFAULT_CPU_QUOTA: "1.0"
      DEFAULT_MEMORY_MB: "128"
      DEFAULT_TIMEOUT: "5s"
      CACHE_TTL: "10m"
      METRICS_TOKEN: "secret-token"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
